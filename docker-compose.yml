services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: docmesh
      POSTGRES_USER: docmesh
      POSTGRES_PASSWORD: docmesh_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=docmesh
      - DB_PASSWORD=docmesh_secret
      - DB_NAME=docmesh
      - JWT_SECRET=change-this-to-a-secure-random-string
      - JWT_EXPIRATION=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
